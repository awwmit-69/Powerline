name: Powerline Build
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip source
        run: unzip -o powerline_src.zip -d .
      - name: Reset web/index.html (so flutter create regenerates the base-href placeholder)
        run: rm -f flutter_app/web/index.html flutter_app/web/manifest.json
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - name: flutter create (regenerate ephemeral platform files)
        working-directory: flutter_app
        run: flutter create .
      - name: pub get
        working-directory: flutter_app
        run: flutter pub get
      - name: dart format (non-blocking)
        working-directory: flutter_app
        run: dart format --output=none --set-exit-if-changed . 2>&1 | tee ../format.log || true
      - name: flutter analyze (non-blocking)
        working-directory: flutter_app
        run: flutter analyze 2>&1 | tee ../analyze.log || true
      - name: flutter test (non-blocking)
        working-directory: flutter_app
        run: flutter test 2>&1 | tee ../test.log || true
      - name: flutter build web
        working-directory: flutter_app
        run: flutter build web --release --base-href /Powerline/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path: "*.log"
      - uses: actions/upload-artifact@v4
        with:
          name: Powerline_Web_Build
          path: flutter_app/build/web
      - uses: actions/upload-pages-artifact@v3
        with:
          path: flutter_app/build/web
  deploy:
    needs: web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip source
        shell: pwsh
        run: Expand-Archive -Path powerline_src.zip -DestinationPath . -Force
      - name: Remove stub platform dirs so flutter create scaffolds full runners
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force flutter_app/windows -ErrorAction SilentlyContinue
          Remove-Item -Force flutter_app/web/index.html -ErrorAction SilentlyContinue
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter config --enable-windows-desktop
      - name: flutter create
        working-directory: flutter_app
        run: flutter create .
      - name: pub get
        working-directory: flutter_app
        run: flutter pub get
      - name: flutter build windows
        working-directory: flutter_app
        run: flutter build windows --release
      - name: zip windows build
        shell: pwsh
        run: |
          $dir = "flutter_app/build/windows/x64/runner/Release"
          if (!(Test-Path $dir)) { $dir = "flutter_app/build/windows/runner/Release" }
          Compress-Archive -Path "$dir/*" -DestinationPath Powerline_Windows_Build.zip
      - uses: actions/upload-artifact@v4
        with:
          name: Powerline_Windows_Build
          path: Powerline_Windows_Build.zip
